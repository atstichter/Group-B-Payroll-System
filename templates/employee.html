<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/styles.css">
<script>
function timer(t){setInterval(()=>{let d=new Date()-new Date(t);let s=Math.floor(d/1000);document.getElementById('t').innerText=Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m '+s%60+'s';},1000);}
</script>
</head>
<body {% if clock_in %}onload="timer('{{clock_in}}')"{% endif %}>

<h2>Employee Dashboard</h2>

<div class="grid">

<div class="top">
{% if active %}
<p id="t"></p>
<form method="POST"><button class="big red" name="clock_out">Clock Out</button></form>
{% else %}
<form method="POST"><button class="big green" name="clock_in">Clock In</button></form>
{% endif %}
</div>

<div class="left">
<h3>Weekly Summary</h3>
<p>Hours: {{total}}</p>
<p>Pay: ${{pay}}</p>
</div>

<div class="right">
<h3>Calendar</h3>
<table class="calendar">
<tr><th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th></tr>
<tr>{% for i in range(7) %}<td>{{calendar[i]}}</td>{% endfor %}</tr>
</table>
</div>

</div>

</body>
</html>
